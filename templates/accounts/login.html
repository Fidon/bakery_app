{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tumaini Bakery</title>
  <link rel="shortcut icon" href="{% static 'images/logo.png' %}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{% static 'css/accounts/login.css' %}" rel="stylesheet" />
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-icon"><i class="bi bi-basket2-fill"></i></div>
    <h1>Tumaini Bakery</h1>
    <p>Sign in to your account</p>
  </div>

  <div class="login-body">
    <form id="login-form" data-url="{% url 'accounts:login' %}" autocomplete="off">
        {% csrf_token %}
        <!-- Error message area -->
        <div id="login-error" class="mb-3 error-alert" style="display:none;">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span id="login-error-msg"></span>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <div class="form-floating flex-fill">
              <input type="text" id="username" name="username"
                    class="form-control" placeholder="Username"
                    autofocus required />
              <label for="username">Username</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <div class="form-floating flex-fill">
              <input type="password" id="password" name="password"
                    class="form-control" placeholder="Password"
                    required />
              <label for="password">Password</label>
            </div>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ request.GET.next }}" />
        <button type="submit" class="btn-login" id="login-btn">
            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
    </form>
  </div>

  <div class="login-footer">
    Fidon_developer | &copy; {% now "Y" %} 
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/accounts/login.js' %}"></script>
</body>
</html>
