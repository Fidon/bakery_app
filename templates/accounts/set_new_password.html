{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password | Tumaini Bakery</title>
  <link rel="shortcut icon" href="{% static 'images/logo.png' %}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% load static %}{% static 'css/accounts/login.css' %}" />
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h1>Tumaini Bakery<br>Set New Password</h1>
    <p>You must set a new password before continuing</p>
  </div>
  <div class="login-body">
    <form id="form-set-password" data-url="{% url 'accounts:set_new_password' %}" autocomplete="off">
      {% csrf_token %}
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <div class="form-floating flex-fill">
            <input type="password" id="new-password" name="new_password"
                   class="form-control" placeholder="New Password" autofocus required />
            <label for="new-password">New Password</label>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <div class="form-floating flex-fill">
            <input type="password" id="confirm-password" name="confirm_password"
                   class="form-control" placeholder="Confirm Password" required />
            <label for="confirm-password">Confirm Password</label>
          </div>
        </div>
      </div>
      <div id="set-pw-error" class="error-alert" style="display:none;">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="set-pw-error-msg"></span>
      </div>
      <button type="submit" class="btn-login" id="btn-set-pw">
        <i class="bi bi-check-lg me-1"></i> Save & Continue
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script>
$(function () {
  $('#form-set-password').on('submit', function (e) {
    e.preventDefault();
    const $btn = $('#btn-set-pw');
    $('#set-pw-error').hide();
    $btn.prop('disabled', true).html('<i class="bi bi-arrow-repeat me-1"></i> Saving...');
    $.ajax({
      url: "{% url 'accounts:set_new_password' %}",
      method: 'POST',
      data: $(this).serialize(),
      success: function (res) {
        if (res.success) {
          window.location.href = res.redirect;
        } else {
          const msg = Object.values(res.errors).flat().join(' ');
          $('#set-pw-error-msg').text(msg);
          $('#set-pw-error').show();
          $btn.prop('disabled', false).html('<i class="bi bi-check-lg me-1"></i> Save & Continue');
        }
      }
    });
  });
});
</script>
</body>
</html>
